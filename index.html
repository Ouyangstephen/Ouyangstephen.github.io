<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Research PDFs</title>

<style>
body { margin:0; font-family:Arial; display:flex; }

.left {
width:350px;
border-right:1px solid #ddd;
padding:20px;
}

.file {
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.right {
flex:1;
padding:20px;
}

iframe {
width:100%;
height:90vh;
border:none;
}
</style>
</head>

<body>

<div class="left">

<h3>PDF Library</h3>

<div id="fileList"></div>

</div>

<div class="right">
<iframe id="viewer"></iframe>
</div>

<script>

const REPO = "Ouyangstephen/Ouyangstephen.github.io";

/* 加载文件 */
async function loadFiles(){

let res = await fetch(`https://api.github.com/repos/${REPO}/contents/pdfs`);

if(res.status !== 200){
fileList.innerHTML = "No PDFs yet";
return;
}

let data = await res.json();

let html="";

data.forEach(f=>{

html+=`
<div class="file" onclick="openPDF('${f.download_url}')">
📄 ${f.name}
</div>
`;

});

fileList.innerHTML = html;
}

/* 打开 */
function openPDF(url){
viewer.src = url;
}

loadFiles();

</script>

</body>
</html>
