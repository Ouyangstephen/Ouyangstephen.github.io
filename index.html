<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website (Cloud)</title>

<style>
body { font-family: Arial; background:#020617; color:white; margin:0; }
nav { display:flex; justify-content:space-between; padding:15px; background:black; }
.section { padding:40px; text-align:center; }
.card { background:#1e293b; margin:10px auto; padding:15px; width:60%; border-radius:10px; }
button { margin:5px; padding:5px 10px; }
.hidden { display:none; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<nav>
  <h2 id="name"></h2>
  <div>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('cn')">中</button>
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</nav>

<div class="section">
  <h1>Total Synthesis</h1>
  <p id="title"></p>
</div>

<div class="section">
  <h2>About</h2>
  <p id="about"></p>
</div>

<div class="section">
  <h2>Sections</h2>
  <div id="sections"></div>
</div>

<div class="section">
  <h2>Publications</h2>
  <div id="pubs"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden section">

<h2>Admin Panel</h2>

<h3>Basic Info</h3>
<input id="name_input">
<input id="title_en">
<input id="title_cn">
<textarea id="about_en"></textarea>
<textarea id="about_cn"></textarea>
<button onclick="saveBasic()">Save</button>

<h3>Add Section</h3>
<input id="s_en">
<input id="s_cn">
<textarea id="c_en"></textarea>
<textarea id="c_cn"></textarea>
<button onclick="addSection()">Add</button>

<h3>Add Publication</h3>
<input id="p_title">
<input id="p_auth">
<input id="p_journal">
<input id="p_year">
<button onclick="addPub()">Add</button>

</div>

<script>

// 🔥 把你的 firebaseConfig 粘这里
const firebaseConfig = {
  apiKey: "替换",
  authDomain: "替换",
  projectId: "替换",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let lang = "en";
let data = {};

function setLang(l){ lang=l; render(); }

// 实时监听
db.collection("site").doc("main").onSnapshot(doc=>{
    if(doc.exists){
        data = doc.data();
        render();
    }
});

function render(){
    if(!data.name) return;

    name.innerText = data.name;
    title.innerText = (lang==="en")?data.title_en:data.title_cn;
    about.innerText = (lang==="en")?data.about_en:data.about_cn;

    sections.innerHTML="";
    (data.sections||[]).forEach((s,i)=>{
        sections.innerHTML += `
        <div class="card">
        <h3>${lang==="en"?s.en:s.cn}</h3>
        <p>${lang==="en"?s.c_en:s.c_cn}</p>
        <button onclick="delSection(${i})">Delete</button>
        </div>`;
    });

    pubs.innerHTML="";
    (data.pubs||[]).forEach((p,i)=>{
        pubs.innerHTML += `
        <div class="card">
        <b>${p.title}</b><br>
        ${p.auth} (${p.year})<br>
        ${p.journal}<br>
        <button onclick="delPub(${i})">Delete</button>
        </div>`;
    });
}

// 🔐 后台密码（你可以改）
function toggleAdmin(){
    let pwd = prompt("Password:");
    if(pwd==="1234"){
        admin.classList.toggle("hidden");
    }
}

// 保存基础信息
function saveBasic(){
    db.collection("site").doc("main").set({
        ...data,
        name:name_input.value,
        title_en:title_en.value,
        title_cn:title_cn.value,
        about_en:about_en.value,
        about_cn:about_cn.value
    });
}

// 添加 section
function addSection(){
    let arr = data.sections||[];
    arr.push({en:s_en.value, cn:s_cn.value, c_en:c_en.value, c_cn:c_cn.value});
    db.collection("site").doc("main").update({sections:arr});
}

// 删除 section
function delSection(i){
    let arr = data.sections;
    arr.splice(i,1);
    db.collection("site").doc("main").update({sections:arr});
}

// 添加 publication
function addPub(){
    let arr = data.pubs||[];
    arr.push({
        title:p_title.value,
        auth:p_auth.value,
        journal:p_journal.value,
        year:p_year.value
    });
    db.collection("site").doc("main").update({pubs:arr});
}

// 删除 publication
function delPub(i){
    let arr = data.pubs;
    arr.splice(i,1);
    db.collection("site").doc("main").update({pubs:arr});
}

</script>

</body>
</html>
