<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<script>
window.MathJax = { tex: { inlineMath: [['\\(','\\)'], ['$', '$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { margin:0; font-family: Arial; background:white; }
.container { display:flex; }

.sidebar {
width:220px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar div { margin:10px 0; cursor:pointer; }

.main {
margin-left:240px;
padding:40px;
max-width:900px;
}

.block {
margin:20px 0;
padding:15px;
background:#fafafa;
border-left:4px solid #007acc;
}

.delete { background:red; color:white; }
.logout { background:black; color:white; }

.hidden { display:none; }
</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h2 id="name"></h2>

<div id="nav"></div>

<hr>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button id="logoutBtn" class="logout" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="main" id="main"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden main">

<h2>Admin</h2>

<h3>Modules</h3>
<input id="new_module" placeholder="New Module Name">
<button onclick="addModule()">Add Module</button>

<div id="moduleList"></div>

<h3>Editor EN</h3>
<div id="editor_en" style="height:120px;"></div>

<h3>Editor CN</h3>
<div id="editor_cn" style="height:120px;"></div>

<input type="file" id="img_file">
<input type="file" id="file_file">

<button onclick="addContent()">Add Content</button>

</div>

<script>

let lang="en";
let current=null;
let selectedModule=null;
let isAdmin=false;

let quillEN, quillCN;

function loadData(){
let raw=localStorage.getItem("site");
if(!raw){
return {name:"Your Name",modules:[]};
}
try{
let d=JSON.parse(raw);
if(!d.modules) d.modules=[];
return d;
}catch{
localStorage.clear();
return {name:"Your Name",modules:[]};
}
}

let data=loadData();

function save(){
localStorage.setItem("site",JSON.stringify(data));
}

function setLang(l){
lang=l;
render();
}

document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="v"){
let pwd=prompt("Password:");
if(pwd==="1234567890qw"){
isAdmin=true;
document.getElementById("admin").classList.remove("hidden");
document.getElementById("logoutBtn").style.display="inline-block";
render();
}
}
});

function logout(){
isAdmin=false;
document.getElementById("admin").classList.add("hidden");
document.getElementById("logoutBtn").style.display="none";
render();
}

/* 模块 */
function addModule(){

let name=document.getElementById("new_module").value;

if(!name){
alert("Enter module name");
return;
}

data.modules.push({
name:name,
contents:[]
});

save();
render();
}

function deleteModule(i){
data.modules.splice(i,1);
save();
render();
}

function selectModule(i){
selectedModule=i;
renderAdmin();
}

/* 内容 */
function addContent(){

if(selectedModule===null){
alert("Select module first");
return;
}

let en=quillEN.root.innerHTML;
let cn=quillCN.root.innerHTML;

let imgFile=img_file.files[0];
let fileFile=file_file.files[0];

let content={en:en,cn:cn};

if(imgFile){
let reader=new FileReader();
reader.onload=function(){
content.img=reader.result;
addFile(content,fileFile);
};
reader.readAsDataURL(imgFile);
}else{
addFile(content,fileFile);
}

}

function addFile(content,fileFile){

if(fileFile){
let reader=new FileReader();
reader.onload=function(){
content.file={
name:fileFile.name,
data:reader.result
};
pushContent(content);
};
reader.readAsDataURL(fileFile);
}else{
pushContent(content);
}

}

function pushContent(content){
data.modules[selectedModule].contents.push(content);
save();
render();
}

function deleteContent(m,i){
data.modules[m].contents.splice(i,1);
save();
render();
}

/* 渲染 */
function render(){

document.getElementById("name").innerText=data.name;

let navHTML="";
data.modules.forEach((m,i)=>{
navHTML+=`<div onclick="openModule(${i})">${m.name}</div>`;
});
document.getElementById("nav").innerHTML=navHTML;

if(current!==null){
renderModule(current);
}

renderAdmin();
}

function openModule(i){
current=i;
renderModule(i);
}

function renderModule(i){

let m=data.modules[i];

let html=`<h1>${m.name}</h1>`;

m.contents.forEach((c,ci)=>{

html+=`
<div class="block">
${lang==="en"?c.en:c.cn}
${c.img?`<img src="${c.img}">`:""}
${c.file?`<br><a href="${c.file.data}" download="${c.file.name}">${c.file.name}</a>`:""}
${isAdmin?`<br><button class="delete" onclick="deleteContent(${i},${ci})">Delete</button>`:""}
</div>`;
});

document.getElementById("main").innerHTML=html;

MathJax.typeset();
}

function renderAdmin(){

let html="";

data.modules.forEach((m,i)=>{
html+=`
<div onclick="selectModule(${i})">
${m.name}
${isAdmin?`<button onclick="deleteModule(${i})">X</button>`:""}
</div>`;
});

document.getElementById("moduleList").innerHTML=html;
}

window.onload=function(){
quillEN=new Quill('#editor_en',{theme:'snow'});
quillCN=new Quill('#editor_cn',{theme:'snow'});
render();
};

</script>

</body>
</html>
