<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Stable Site</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
.container { display:flex; }

.sidebar {
width:220px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.main {
margin-left:240px;
padding:40px;
}

.block {
margin:20px 0;
padding:15px;
background:#f0f0f0;
}

.delete { background:red; color:white; }
.hidden { display:none; }
</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Site</h2>
<div id="nav"></div>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="main" id="main"></div>

</div>

<div id="admin" class="hidden main">

<h3>Add Module</h3>
<input id="new_module">
<button onclick="addModule()">Add</button>

<div id="moduleList"></div>

<h3>Editor EN</h3>
<div id="editor_en" style="height:100px;"></div>

<h3>Editor CN</h3>
<div id="editor_cn" style="height:100px;"></div>

<input type="file" id="file_file">

<button onclick="addContent()">Add Content</button>

</div>

<script>

let lang="en";
let data = JSON.parse(localStorage.getItem("site")) || {modules:[]};
let current=null, selected=null, isAdmin=false;

let quillEN, quillCN;

function save(){
localStorage.setItem("site", JSON.stringify(data));
}

document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key==="V"){
let pwd=prompt("Password");
if(pwd==="1234567890qw"){
isAdmin=true;
admin.classList.remove("hidden");
logoutBtn.style.display="inline";
render();
}
}
});

function logout(){
isAdmin=false;
admin.classList.add("hidden");
logoutBtn.style.display="none";
render();
}

function addModule(){
let name=new_module.value;
if(!name) return;
data.modules.push({name:name,contents:[]});
save(); render();
}

function selectModule(i){ selected=i; }

function addContent(){

if(selected===null) return alert("select module");

let content={
en:quillEN.root.innerHTML,
cn:quillCN.root.innerHTML
};

let file=file_file.files[0];

if(file){
let reader=new FileReader();
reader.onload=function(){
content.file={
name:file.name,
data:reader.result
};
push(content);
};
reader.readAsDataURL(file);
}else{
push(content);
}
}

function push(c){
data.modules[selected].contents.push(c);
save(); render();
}

function downloadFile(base64,name){

let a=document.createElement("a");
a.href=base64;
a.download=name;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
}

function render(){

nav.innerHTML=data.modules.map((m,i)=>
`<div onclick="openModule(${i})">${m.name}</div>`
).join("");

moduleList.innerHTML=data.modules.map((m,i)=>
`<div onclick="selectModule(${i})">${m.name}</div>`
).join("");

if(current!==null){
let m=data.modules[current];

let html=`<h2>${m.name}</h2>`;

m.contents.forEach((c,i)=>{

html+=`
<div class="block">
${lang==="en"?c.en:c.cn}

${c.file?`<br><button onclick="downloadFile('${c.file.data}','${c.file.name}')">Download ${c.file.name}</button>`:""}

${isAdmin?`<br><button class="delete" onclick="del(${current},${i})">Delete</button>`:""}
</div>`;
});

main.innerHTML=html;
}
}

function openModule(i){
current=i;
render();
}

function del(m,i){
data.modules[m].contents.splice(i,1);
save(); render();
}

function setLang(l){ lang=l; render(); }

window.onload=function(){
quillEN=new Quill('#editor_en',{theme:'snow'});
quillCN=new Quill('#editor_cn',{theme:'snow'});
render();
};

</script>

</body>
</html>
