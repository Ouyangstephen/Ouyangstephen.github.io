<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<style>
body { font-family: Arial; background:#020617; color:white; margin:0; }
nav { display:flex; justify-content:space-between; padding:15px; background:black; }
.section { padding:60px 20px; text-align:center; }
h1 { font-size:40px; }
h2 { margin-top:50px; font-size:32px; }
.block { margin:20px auto; width:60%; }
img { max-width:100%; border-radius:10px; margin-top:10px; }
button { margin:5px; padding:5px 10px; }
.hidden { display:none; }
</style>

</head>

<body>

<nav>
  <h2 id="name"></h2>
  <div>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('cn')">中文</button>
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</nav>

<div class="section">
  <h1>Total Synthesis</h1>
  <p id="title"></p>
</div>

<div id="content"></div>

<!-- ADMIN -->
<div id="admin" class="hidden section">

<h2>Admin Panel</h2>

<input id="name_input" placeholder="Name">
<input id="title_en">
<input id="title_cn">
<button onclick="saveBasic()">Save</button>

<h3>Add Section（大标题）</h3>
<input id="sec_en" placeholder="Title EN">
<input id="sec_cn" placeholder="Title CN">
<button onclick="addSection()">Add Section</button>

<h3>Add Content（内容块）</h3>
<input id="sec_index" placeholder="Section index">
<textarea id="text_en" placeholder="Text EN"></textarea>
<textarea id="text_cn" placeholder="Text CN"></textarea>
<input type="file" id="img_file">
<button onclick="addContent()">Add Content</button>

</div>

<script>

let lang="en";

let data = JSON.parse(localStorage.getItem("site")) || {
    name:"Stephen Ouyang",
    title_en:"Future researcher in pharmaceutical total synthesis",
    title_cn:"未来从事药物全合成研究的科研人员",
    sections:[]
};

function save(){
    localStorage.setItem("site", JSON.stringify(data));
}

function setLang(l){
    lang=l;
    render();
}

function render(){

    name.innerText = data.name;
    title.innerText = (lang==="en")?data.title_en:data.title_cn;

    content.innerHTML="";

    data.sections.forEach((s,i)=>{

        let html = `
        <div class="section">
            <h2>${lang==="en"?s.title_en:s.title_cn}</h2>
        `;

        if(s.contents){
            s.contents.forEach((c,ci)=>{
                html += `
                <div class="block">
                    <p>${lang==="en"?c.en:c.cn}</p>
                    ${c.img ? `<img src="${c.img}">` : ""}
                    <button onclick="delContent(${i},${ci})">Delete</button>
                </div>
                `;
            });
        }

        html += `</div>`;
        content.innerHTML += html;
    });
}

function toggleAdmin(){
    let pwd = prompt("Password:");
    if(pwd==="1234"){
        admin.classList.toggle("hidden");
    }
}

function saveBasic(){
    data.name = name_input.value;
    data.title_en = title_en.value;
    data.title_cn = title_cn.value;
    save(); render();
}

function addSection(){
    data.sections.push({
        title_en:sec_en.value,
        title_cn:sec_cn.value,
        contents:[]
    });
    save(); render();
}

function addContent(){

    let i = sec_index.value;

    let file = img_file.files[0];

    if(file){
        let reader = new FileReader();
        reader.onload = function(){
            data.sections[i].contents.push({
                en:text_en.value,
                cn:text_cn.value,
                img:reader.result
            });
            save(); render();
        };
        reader.readAsDataURL(file);
    }else{
        data.sections[i].contents.push({
            en:text_en.value,
            cn:text_cn.value,
            img:null
        });
        save(); render();
    }
}

function delContent(i,ci){
    data.sections[i].contents.splice(ci,1);
    save(); render();
}

render();

</script>

</body>
</html>
