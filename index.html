<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<script>
window.MathJax = { tex: { inlineMath: [['\\(','\\)'], ['$', '$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { margin:0; font-family: Arial; }
.container { display:flex; }

.sidebar {
width:220px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.main {
margin-left:240px;
padding:40px;
max-width:900px;
}

.block {
margin:20px 0;
padding:15px;
background:#f0f0f0;
}

.delete { background:red; color:white; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Research</h2>
<div id="nav"></div>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="main" id="main"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden main">

<h3>Add Module</h3>
<input id="new_module">
<button onclick="addModule()">Add</button>

<div id="moduleList"></div>

<h3>Editor EN</h3>
<div id="editor_en" style="height:120px;"></div>

<h3>Editor CN</h3>
<div id="editor_cn" style="height:120px;"></div>

<!-- 🔥 GitHub 文件输入 -->
<h3>Add PDF (just type file name)</h3>
<input id="pdf_name" placeholder="example.pdf">

<button onclick="addContent()">Add Content</button>

</div>

<script>

/* 🔥 修改这里（只改一次） */
const GITHUB_USER = "Ouyangstephen";
const REPO_NAME = "Ouyangstephen.github.io
";

function getPDFUrl(name){
return `https://${GITHUB_USER}.github.io/${REPO_NAME}/files/${name}`;
}

let lang="en";
let data = JSON.parse(localStorage.getItem("site")) || {modules:[]};
let current=null, selected=null, isAdmin=false;

let quillEN, quillCN;

function save(){
localStorage.setItem("site", JSON.stringify(data));
}

/* 后台 */
document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key==="V"){
let pwd=prompt("Password");
if(pwd==="1234567890qw"){
isAdmin=true;
admin.classList.remove("hidden");
logoutBtn.style.display="inline";
render();
}
}
});

function logout(){
isAdmin=false;
admin.classList.add("hidden");
logoutBtn.style.display="none";
render();
}

/* 模块 */
function addModule(){
let name=new_module.value;
if(!name) return;
data.modules.push({name:name,contents:[]});
save(); render();
}

function selectModule(i){ selected=i; }

/* 添加内容 */
function addContent(){

if(selected===null) return alert("Select module");

let pdfName = document.getElementById("pdf_name").value;

let content={
en:quillEN.root.innerHTML,
cn:quillCN.root.innerHTML,
pdf: pdfName ? {
name: pdfName,
url: getPDFUrl(pdfName)
} : null
};

data.modules[selected].contents.push(content);

save();
render();
}

/* 渲染 */
function render(){

nav.innerHTML = data.modules.map((m,i)=>
`<div onclick="openModule(${i})">${m.name}</div>`
).join("");

moduleList.innerHTML = data.modules.map((m,i)=>
`<div onclick="selectModule(${i})">${m.name}</div>`
).join("");

if(current!==null){

let m=data.modules[current];

main.innerHTML = `
<h1>${m.name}</h1>
${m.contents.map((c)=>`
<div class="block">
${lang==="en"?c.en:c.cn}

${c.pdf ? `
<br>
<a href="${c.pdf.url}" target="_blank">
📄 ${c.pdf.name}
</a>
` : ""}

</div>
`).join("")}
`;

MathJax.typeset();
}
}

function openModule(i){
current=i;
render();
}

function setLang(l){ lang=l; render(); }

window.onload=function(){
quillEN=new Quill('#editor_en',{theme:'snow'});
quillCN=new Quill('#editor_cn',{theme:'snow'});
render();
};

</script>

</body>
</html>
