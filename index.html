<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<!-- Quill -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<!-- MathJax -->
<script>
window.MathJax = { tex: { inlineMath: [['\\(','\\)'], ['$', '$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { margin:0; font-family: Arial; background:white; }
.container { display:flex; }

.sidebar {
width:220px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar div { margin:10px 0; cursor:pointer; }

.main {
margin-left:240px;
padding:40px;
max-width:900px;
}

.block {
margin:20px 0;
padding:15px;
background:#fafafa;
border-left:4px solid #007acc;
}

.delete { background:red; color:white; }
.logout { background:black; color:white; }
.hidden { display:none; }

.upload-box {
border:2px dashed #ccc;
padding:20px;
text-align:center;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Research</h2>

<div id="nav"></div>

<hr>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>

<button id="logoutBtn" class="logout" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="main" id="main"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden main">

<h2>Admin Panel</h2>

<input id="new_module" placeholder="New Module">
<button onclick="addModule()">Add Module</button>

<div id="moduleList"></div>

<h3>Editor EN</h3>
<div id="editor_en" style="height:120px;"></div>

<h3>Editor CN</h3>
<div id="editor_cn" style="height:120px;"></div>

<h3>Upload PDFs</h3>
<div id="uploadBox" class="upload-box">
Drag or Click
<input type="file" id="file_input" multiple accept="application/pdf" hidden>
</div>

<ul id="fileList"></ul>

<h3>Upload Image</h3>
<input type="file" id="img_input">

<button onclick="addContent()">Add Content</button>

</div>

<script>

let lang="en";
let current=null;
let selected=null;
let isAdmin=false;

let uploadedFiles=[];
let quillEN, quillCN;

/* 数据 */
let data = JSON.parse(localStorage.getItem("site")) || {modules:[]};

function save(){
localStorage.setItem("site", JSON.stringify(data));
}

function setLang(l){ lang=l; render(); }

/* 后台快捷键 */
document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="v"){
let pwd=prompt("Password");
if(pwd==="1234567890qw"){
isAdmin=true;
admin.classList.remove("hidden");
logoutBtn.style.display="inline";
render();
}
}
});

function logout(){
isAdmin=false;
admin.classList.add("hidden");
logoutBtn.style.display="none";
render();
}

/* 模块 */
function addModule(){
let name=new_module.value;
if(!name) return;
data.modules.push({name:name,contents:[]});
save(); render();
}

function selectModule(i){ selected=i; }

function deleteModule(i){
data.modules.splice(i,1);
save(); render();
}

/* 文件上传 UI */
uploadBox.onclick = ()=> file_input.click();

file_input.addEventListener("change", e=>{
handleFiles(e.target.files);
});

uploadBox.addEventListener("dragover", e=> e.preventDefault());

uploadBox.addEventListener("drop", e=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
});

/* 文件处理 */
function handleFiles(files){

for(let file of files){

let reader=new FileReader();

reader.onload=function(e){

uploadedFiles.push({
name:file.name,
data:e.target.result
});

renderFileList();

};

reader.readAsDataURL(file);
}
}

function renderFileList(){

fileList.innerHTML = uploadedFiles.map((f,i)=>`
<li>
📄 ${f.name}
<button onclick="downloadFile('${f.data}','${f.name}')">Open</button>
${isAdmin?`<button onclick="removeFile(${i})">X</button>`:""}
</li>
`).join("");
}

function removeFile(i){
uploadedFiles.splice(i,1);
renderFileList();
}

/* 添加内容 */
function addContent(){

if(selected===null) return alert("Select module");

let content={
en:quillEN.root.innerHTML,
cn:quillCN.root.innerHTML,
files:[...uploadedFiles]
};

let img=img_input.files[0];

if(img){
let reader=new FileReader();
reader.onload=function(e){
content.img=e.target.result;
push(content);
};
reader.readAsDataURL(img);
}else{
push(content);
}

uploadedFiles=[];
renderFileList();
}

/* 保存 */
function push(c){
data.modules[selected].contents.push(c);
save(); render();
}

/* 下载 */
function downloadFile(base64,name){
let a=document.createElement("a");
a.href=base64;
a.download=name;
a.click();
}

/* 删除 */
function deleteContent(m,i){
data.modules[m].contents.splice(i,1);
save(); render();
}

function deleteFile(m,c,f){
data.modules[m].contents[c].files.splice(f,1);
save(); render();
}

/* 渲染 */
function render(){

nav.innerHTML = data.modules.map((m,i)=>
`<div onclick="openModule(${i})">${m.name}</div>`
).join("");

moduleList.innerHTML = data.modules.map((m,i)=>
`<div onclick="selectModule(${i})">
${m.name}
${isAdmin?`<button onclick="deleteModule(${i})">X</button>`:""}
</div>`
).join("");

if(current!==null){

let m=data.modules[current];

main.innerHTML = `
<h1>${m.name}</h1>
${m.contents.map((c,ci)=>`
<div class="block">
${lang==="en"?c.en:c.cn}
${c.img?`<img src="${c.img}" style="max-width:100%;">`:""}

${c.files?c.files.map((f,fi)=>`
<br>
<button onclick="downloadFile('${f.data}','${f.name}')">${f.name}</button>
${isAdmin?`<button onclick="deleteFile(${current},${ci},${fi})">X</button>`:""}
`).join(""):""}

${isAdmin?`<br><button class="delete" onclick="deleteContent(${current},${ci})">Delete</button>`:""}
</div>
`).join("")}
`;

MathJax.typeset();
}

}

/* 打开模块 */
function openModule(i){
current=i;
render();
}

/* 初始化 */
window.onload=function(){
quillEN=new Quill('#editor_en',{theme:'snow'});
quillCN=new Quill('#editor_cn',{theme:'snow'});
render();
};

</script>

</body>
</html>
