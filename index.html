<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Research Site</title>

<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)'], ['$', '$']] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { font-family: Arial; background:white; }
.block { margin:20px; padding:15px; background:#f0f0f0; }
button { margin:5px; }
.delete { background:red; color:white; }
.logout { background:#333; color:white; }
</style>

</head>

<body>

<h1 id="title"></h1>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>

<!-- Logout按钮 -->
<button id="logoutBtn" class="logout" style="display:none;" onclick="logout()">Logout</button>

<hr>

<h2>Research</h2>
<div id="research"></div>

<h2>Publications</h2>
<div id="papers"></div>

<!-- ADMIN -->
<div id="admin" style="display:none;">

<h3>Add Research</h3>
<textarea id="text_en"></textarea>
<textarea id="text_cn"></textarea>
<button onclick="addResearch()">Add</button>

<h3>Add Paper</h3>
<input id="p_title" placeholder="Title">
<input id="p_auth" placeholder="Authors">
<input id="p_journal" placeholder="Journal">
<input id="p_year" placeholder="Year">
<button onclick="addPaper()">Add</button>

</div>

<script>

let lang="en";
let isAdmin=false;

/* 🔥 快捷键触发后台 */
document.addEventListener("keydown", function(e){

if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "v"){

let pwd = prompt("Enter password:");

if(pwd==="1234567890qw"){
isAdmin = true;
document.getElementById("admin").style.display = "block";
document.getElementById("logoutBtn").style.display = "inline-block";
render();
}else{
alert("Wrong password");
}

}

});

/* 退出 */
function logout(){
isAdmin=false;
document.getElementById("admin").style.display="none";
document.getElementById("logoutBtn").style.display="none";
render();
}

/* 数据 */
function loadData(){
let raw = localStorage.getItem("site");

if(!raw){
return {
title_en:"Research in Total Synthesis",
title_cn:"全合成研究",
research:[],
papers:[]
};
}

try{
let d = JSON.parse(raw);
if(!d.research) d.research=[];
if(!d.papers) d.papers=[];
return d;
}catch(e){
localStorage.clear();
return {
title_en:"Research in Total Synthesis",
title_cn:"全合成研究",
research:[],
papers:[]
};
}
}

let data = loadData();

function save(){
localStorage.setItem("site", JSON.stringify(data));
}

function setLang(l){
lang=l;
render();
}

/* 添加 */
function addResearch(){

let en=document.getElementById("text_en").value;
let cn=document.getElementById("text_cn").value;

if(en.trim()===""){
alert("Please write something");
return;
}

data.research.push({en:en, cn:cn});

document.getElementById("text_en").value="";
document.getElementById("text_cn").value="";

save();
render();
}

function addPaper(){

let title=document.getElementById("p_title").value;

if(title===""){
alert("Title required");
return;
}

data.papers.push({
title:title,
auth:document.getElementById("p_auth").value,
journal:document.getElementById("p_journal").value,
year:p_year.value
});

save();
render();
}

/* 删除 */
function deleteResearch(i){
if(confirm("Delete this item?")){
data.research.splice(i,1);
save();
render();
}
}

function deletePaper(i){
if(confirm("Delete this paper?")){
data.papers.splice(i,1);
save();
render();
}
}

/* 渲染 */
function render(){

document.getElementById("title").innerText =
(lang==="en"?data.title_en:data.title_cn);

/* Research */
let rHTML="";
data.research.forEach((r,i)=>{
rHTML += `
<div class="block">
${lang==="en"?r.en:r.cn}
${isAdmin ? `<br><button class="delete" onclick="deleteResearch(${i})">Delete</button>` : ""}
</div>`;
});
document.getElementById("research").innerHTML=rHTML;

/* Papers */
let pHTML="";
data.papers.forEach((p,i)=>{
pHTML += `
<div class="block">
<b>${p.title}</b><br>
${p.auth}<br>
<i>${p.journal} (${p.year})</i>
${isAdmin ? `<br><button class="delete" onclick="deletePaper(${i})">Delete</button>` : ""}
</div>`;
});
document.getElementById("papers").innerHTML=pHTML;

MathJax.typeset();
}

render();

</script>

</body>
</html>
