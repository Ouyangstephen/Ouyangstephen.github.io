<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Academic Website</title>

<!-- Quill -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<!-- MathJax -->
<script>
window.MathJax = { tex: { inlineMath: [['\\(','\\)'], ['$', '$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { margin:0; font-family: Arial; background:white; }
.container { display:flex; }

/* Sidebar */
.sidebar {
width:240px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
overflow:auto;
}

.sidebar div {
margin:10px 0;
cursor:pointer;
}

.sidebar div:hover { color:#007acc; }

/* Main */
.main {
margin-left:260px;
padding:40px;
max-width:900px;
}

/* Blocks */
.block {
margin:20px 0;
padding:15px;
background:#fafafa;
border-left:4px solid #007acc;
}

.delete { background:red; color:white; }
.logout { background:black; color:white; }
.hidden { display:none; }

img { max-width:100%; margin-top:10px; }

</style>

</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2>My Site</h2>

<div onclick="switchPage('home')">Home</div>

<div id="moduleList"></div>

<hr>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>

<button id="logoutBtn" class="logout" style="display:none;" onclick="logout()">Logout</button>
</div>

<!-- Main -->
<div class="main" id="main"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden main">

<h2>Admin Panel</h2>

<h3>Add Module</h3>
<input id="new_module">
<button onclick="addModule()">Add Module</button>

<h3>Select Module</h3>
<div id="adminModuleList"></div>

<h3>Editor EN</h3>
<div id="editor_en" style="height:150px;"></div>

<h3>Editor CN</h3>
<div id="editor_cn" style="height:150px;"></div>

<h3>Upload Image</h3>
<input type="file" id="img_file">

<h3>Upload File (PDF etc.)</h3>
<input type="file" id="file_file">

<button onclick="addContent()">Add Content</button>

</div>

<script>

let lang="en";
let current="home";
let isAdmin=false;
let selectedModule=null;

let quillEN, quillCN;

/* 数据 */
function loadData(){
let raw = localStorage.getItem("site");

if(!raw){
return {modules:[]};
}

try{
let d=JSON.parse(raw);
if(!d.modules) d.modules=[];
return d;
}catch(e){
localStorage.clear();
return {modules:[]};
}
}

let data=loadData();

function save(){
localStorage.setItem("site", JSON.stringify(data));
}

/* 切换 */
function switchPage(p){
current=p;
render();
}

/* 语言 */
function setLang(l){
lang=l;
render();
}

/* 快捷键 */
document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="v"){
let pwd=prompt("Password:");
if(pwd==="1234567890qw"){
isAdmin=true;
document.getElementById("admin").classList.remove("hidden");
document.getElementById("logoutBtn").style.display="inline-block";
render();
}
}
});

function logout(){
isAdmin=false;
document.getElementById("admin").classList.add("hidden");
document.getElementById("logoutBtn").style.display="none";
render();
}

/* 模块 */
function addModule(){

let name=document.getElementById("new_module").value;

if(!name){
alert("Enter module name");
return;
}

data.modules.push({
name:name,
contents:[]
});

save();
render();
}

/* 内容添加 */
function addContent(){

if(selectedModule===null){
alert("Select module first");
return;
}

let enHTML = quillEN.root.innerHTML;
let cnHTML = quillCN.root.innerHTML;

let img = document.getElementById("img_file").files[0];
let file = document.getElementById("file_file").files[0];

let content = { en:enHTML, cn:cnHTML };

function saveContent(){
data.modules[selectedModule].contents.push(content);
save();
render();
}

/* 图片 */
if(img){
let reader=new FileReader();
reader.onload=function(){
content.img=reader.result;
saveContent();
};
reader.readAsDataURL(img);
}else if(file){
let reader=new FileReader();
reader.onload=function(){
content.file=reader.result;
content.filename=file.name;
saveContent();
};
reader.readAsDataURL(file);
}else{
saveContent();
}

quillEN.setText("");
quillCN.setText("");
}

/* 删除 */
function deleteContent(m,i){
data.modules[m].contents.splice(i,1);
save();
render();
}

function deleteModule(i){
data.modules.splice(i,1);
save();
render();
}

/* 渲染 */
function render(){

let moduleList=document.getElementById("moduleList");
moduleList.innerHTML="";

data.modules.forEach((m,i)=>{
moduleList.innerHTML+=`
<div onclick="current=${i};render();">${m.name}</div>`;
});

/* Admin module list */
let adminList=document.getElementById("adminModuleList");
if(adminList){
adminList.innerHTML="";
data.modules.forEach((m,i)=>{
adminList.innerHTML+=`
<div onclick="selectedModule=${i}">
${m.name}
${isAdmin?`<button onclick="deleteModule(${i})">X</button>`:""}
</div>`;
});
}

let main=document.getElementById("main");

/* Home */
if(current==="home"){
main.innerHTML="<h1>Welcome</h1>";
return;
}

/* Module page */
let m=data.modules[current];

let html=`<h1>${m.name}</h1>`;

m.contents.forEach((c,i)=>{
html+=`
<div class="block">
${lang==="en"?c.en:c.cn}
${c.img?`<img src="${c.img}">`:""}
${c.file?`<br><a href="${c.file}" download="${c.filename}">Download ${c.filename}</a>`:""}
${isAdmin?`<br><button class="delete" onclick="deleteContent(${current},${i})">Delete</button>`:""}
</div>`;
});

main.innerHTML=html;

MathJax.typeset();
}

/* 初始化 */
window.onload=function(){
quillEN=new Quill('#editor_en',{theme:'snow'});
quillCN=new Quill('#editor_cn',{theme:'snow'});
render();
};

</script>

</body>
</html>
