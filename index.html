<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<!-- Quill -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<!-- MathJax -->
<script>
window.MathJax = { tex: { inlineMath: [['\\(','\\)'], ['$', '$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { margin:0; font-family: Arial; background:white; }
.container { display:flex; }

/* Sidebar */
.sidebar {
width:220px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar div { margin:10px 0; cursor:pointer; }

/* Main */
.main {
margin-left:240px;
padding:40px;
max-width:900px;
}

/* Blocks */
.block {
margin:20px 0;
padding:15px;
background:#fafafa;
border-left:4px solid #007acc;
}

.delete { background:red; color:white; }
.logout { background:black; color:white; }

.hidden { display:none; }

</style>

</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2 id="name"></h2>

<div onclick="switchPage('home')">Home</div>
<div onclick="switchPage('research')">Research</div>
<div onclick="switchPage('papers')">Publications</div>
<div onclick="switchPage('cv')">CV</div>

<hr>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>

<button id="logoutBtn" class="logout" style="display:none;" onclick="logout()">Logout</button>
</div>

<!-- Main -->
<div class="main" id="main"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden main">

<h2>Admin Panel</h2>

<h3>Editor EN</h3>
<div id="editor_en" style="height:150px;"></div>

<h3>Editor CN</h3>
<div id="editor_cn" style="height:150px;"></div>

<input type="file" id="img_file">
<button onclick="addResearch()">Add Research Block</button>

<h3>Add Paper</h3>
<input id="p_title" placeholder="Title">
<input id="p_auth" placeholder="Authors">
<input id="p_journal" placeholder="Journal">
<input id="p_year" placeholder="Year">
<button onclick="addPaper()">Add Paper</button>

<h3>Upload CV (PDF)</h3>
<input type="file" id="cv_file">
<button onclick="uploadCV()">Upload CV</button>

</div>

<script>

let lang="en";
let current="home";
let isAdmin=false;

let quillEN, quillCN;

/* 安全加载 */
function loadData(){
let raw = localStorage.getItem("site");
if(!raw){
return {name:"Your Name",research:[],papers:[],cv:null};
}
try{
let d=JSON.parse(raw);
if(!d.research) d.research=[];
if(!d.papers) d.papers=[];
return d;
}catch(e){
localStorage.clear();
return {name:"Your Name",research:[],papers:[],cv:null};
}
}

let data=loadData();

function save(){
localStorage.setItem("site",JSON.stringify(data));
}

function setLang(l){
lang=l;
render();
}

function switchPage(p){
current=p;
render();
}

/* 🔥 快捷键后台 */
document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="v"){
let pwd=prompt("Password:");
if(pwd==="1234567890qw"){
isAdmin=true;
document.getElementById("admin").classList.remove("hidden");
document.getElementById("logoutBtn").style.display="inline-block";
render();
}
}
});

function logout(){
isAdmin=false;
document.getElementById("admin").classList.add("hidden");
document.getElementById("logoutBtn").style.display="none";
render();
}

/* 添加研究 */
function addResearch(){

let enHTML=quillEN.root.innerHTML;
let cnHTML=quillCN.root.innerHTML;

let file=document.getElementById("img_file").files[0];

if(file){
let reader=new FileReader();
reader.onload=function(){
data.research.push({en:enHTML,cn:cnHTML,img:reader.result});
save(); render();
};
reader.readAsDataURL(file);
}else{
data.research.push({en:enHTML,cn:cnHTML});
save(); render();
}

quillEN.setText("");
quillCN.setText("");
}

/* 删除 */
function deleteResearch(i){
if(confirm("Delete?")){
data.research.splice(i,1);
save(); render();
}
}

/* 论文 */
function addPaper(){
data.papers.push({
title:p_title.value,
auth:p_auth.value,
journal:p_journal.value,
year:p_year.value
});
save(); render();
}

function deletePaper(i){
data.papers.splice(i,1);
save(); render();
}

/* CV */
function uploadCV(){
let file=cv_file.files[0];
let reader=new FileReader();
reader.onload=function(){
data.cv=reader.result;
save();
alert("CV uploaded");
};
reader.readAsDataURL(file);
}

/* 渲染 */
function render(){

document.getElementById("name").innerText=data.name;

let main=document.getElementById("main");

if(current==="home"){
main.innerHTML="<h1>Welcome</h1>";
}

if(current==="research"){

let html="<h1>Research</h1>";

data.research.forEach((r,i)=>{
html+=`
<div class="block">
${lang==="en"?r.en:r.cn}
${r.img?`<img src="${r.img}">`:""}
${isAdmin?`<br><button class="delete" onclick="deleteResearch(${i})">Delete</button>`:""}
</div>`;
});

main.innerHTML=html;
MathJax.typeset();
}

if(current==="papers"){

let html="<h1>Publications</h1>";

data.papers.forEach((p,i)=>{
html+=`
<div class="block">
<b>${p.title}</b><br>
${p.auth}<br>
<i>${p.journal} (${p.year})</i>
${isAdmin?`<br><button class="delete" onclick="deletePaper(${i})">Delete</button>`:""}
</div>`;
});

main.innerHTML=html;
}

if(current==="cv"){

if(data.cv){
main.innerHTML=`<h1>CV</h1><a href="${data.cv}" download="CV.pdf">Download CV</a>`;
}else{
main.innerHTML="<h1>No CV uploaded</h1>";
}
}

}

/* 初始化 */
window.onload=function(){
quillEN=new Quill('#editor_en',{theme:'snow'});
quillCN=new Quill('#editor_cn',{theme:'snow'});
render();
};

</script>

</body>
</html>
