<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<script>
window.MathJax = { tex: { inlineMath: [['\\(','\\)'], ['$', '$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { margin:0; font-family: Arial; background:white; }
.container { display:flex; }

.sidebar {
width:220px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar div { margin:10px 0; cursor:pointer; }

.main {
margin-left:240px;
padding:40px;
max-width:900px;
}

.block {
margin:20px 0;
padding:15px;
background:#fafafa;
border-left:4px solid #007acc;
}

.delete { background:red; color:white; }
.hidden { display:none; }
</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h2 id="name"></h2>
<div id="nav"></div>

<hr>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="main" id="main"></div>

</div>

<div id="admin" class="hidden main">

<h2>Admin</h2>

<input id="new_module" placeholder="Module name">
<button onclick="addModule()">Add Module</button>

<div id="moduleList"></div>

<h3>Editor EN</h3>
<div id="editor_en" style="height:120px;"></div>

<h3>Editor CN</h3>
<div id="editor_cn" style="height:120px;"></div>

<input type="file" id="img_file">
<input type="file" id="file_file">

<button onclick="addContent()">Add Content</button>

</div>

<script>

let lang="en";
let current=null;
let selectedModule=null;
let isAdmin=false;

let quillEN, quillCN;

function loadData(){
let raw=localStorage.getItem("site");
if(!raw) return {name:"Your Name",modules:[]};

try{
let d=JSON.parse(raw);
if(!d.modules) d.modules=[];
return d;
}catch{
localStorage.clear();
return {name:"Your Name",modules:[]};
}
}

let data=loadData();

function save(){
localStorage.setItem("site",JSON.stringify(data));
}

function setLang(l){ lang=l; render(); }

document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==="v"){
let pwd=prompt("Password:");
if(pwd==="1234567890qw"){
isAdmin=true;
admin.classList.remove("hidden");
logoutBtn.style.display="inline-block";
render();
}
}
});

function logout(){
isAdmin=false;
admin.classList.add("hidden");
logoutBtn.style.display="none";
render();
}

/* 模块 */
function addModule(){
let name=new_module.value;
if(!name) return alert("Enter name");

data.modules.push({name:name,contents:[]});
save(); render();
}

function deleteModule(i){
data.modules.splice(i,1);
save(); render();
}

function selectModule(i){
selectedModule=i;
}

/* 内容 */
function addContent(){

if(selectedModule===null){
alert("Select module first");
return;
}

let content={
en:quillEN.root.innerHTML,
cn:quillCN.root.innerHTML
};

let file=file_file.files[0];

if(file){
content.fileName=file.name;
content.fileURL=URL.createObjectURL(file);  // 🔥关键修复
}

let img=img_file.files[0];

if(img){
let reader=new FileReader();
reader.onload=function(){
content.img=reader.result;
push(content);
};
reader.readAsDataURL(img);
}else{
push(content);
}

}

function push(content){
data.modules[selectedModule].contents.push(content);
save();
render();
}

function deleteContent(m,i){
data.modules[m].contents.splice(i,1);
save(); render();
}

/* 渲染 */
function render(){

name.innerText=data.name;

nav.innerHTML=data.modules.map((m,i)=>
`<div onclick="openModule(${i})">${m.name}</div>`
).join("");

if(current!==null) renderModule(current);

moduleList.innerHTML=data.modules.map((m,i)=>
`<div onclick="selectModule(${i})">${m.name} ${isAdmin?`<button onclick="deleteModule(${i})">X</button>`:""}</div>`
).join("");
}

function openModule(i){
current=i;
renderModule(i);
}

function renderModule(i){

let m=data.modules[i];

let html=`<h1>${m.name}</h1>`;

m.contents.forEach((c,ci)=>{

html+=`
<div class="block">
${lang==="en"?c.en:c.cn}
${c.img?`<img src="${c.img}">`:""}
${c.fileURL?`<br><a href="${c.fileURL}" download="${c.fileName}">Download ${c.fileName}</a>`:""}
${isAdmin?`<br><button class="delete" onclick="deleteContent(${i},${ci})">Delete</button>`:""}
</div>`;
});

main.innerHTML=html;

MathJax.typeset();
}

window.onload=function(){
quillEN=new Quill('#editor_en',{theme:'snow'});
quillCN=new Quill('#editor_cn',{theme:'snow'});
render();
};

</script>

</body>
</html>
