<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Research Website</title>

<!-- Quill -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<!-- MathJax -->
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)'], ['$', '$']] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { margin:0; font-family: Georgia; background:white; }
.container { display:flex; }

.sidebar {
width:220px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar div { margin:10px 0; cursor:pointer; }

.main {
margin-left:240px;
padding:40px;
max-width:900px;
}

.block {
margin:20px 0;
padding:15px;
background:#fafafa;
border-left:4px solid #007acc;
}

.paper { margin:15px 0; }

.hidden { display:none; }

button { margin:5px; }
</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h2 id="name"></h2>

<div onclick="switchPage('home')">Home</div>
<div onclick="switchPage('research')">Research</div>
<div onclick="switchPage('papers')">Publications</div>

<hr>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button onclick="toggleAdmin()">Admin</button>
</div>

<div class="main" id="main"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden main">

<h2>Admin Panel</h2>

<h3>Basic</h3>
<input id="name_input" placeholder="Name">
<input id="title_en" placeholder="Title EN">
<input id="title_cn" placeholder="Title CN">
<button onclick="saveBasic()">Save</button>

<h3>Research Editor (EN)</h3>
<div id="editor_en" style="height:150px;background:white;"></div>

<h3>Research Editor (CN)</h3>
<div id="editor_cn" style="height:150px;background:white;"></div>

<button onclick="addResearch()">Add Research</button>

<h3>Add Paper</h3>
<input id="p_title" placeholder="Title">
<input id="p_auth" placeholder="Authors">
<input id="p_journal" placeholder="Journal">
<input id="p_year" placeholder="Year">
<button onclick="addPaper()">Add Paper</button>

</div>

<script>

let lang="en";
let currentPage="home";
let quillEN, quillCN;

let data = JSON.parse(localStorage.getItem("site")) || {
name:"Stephen Ouyang",
title_en:"Research in Total Synthesis",
title_cn:"全合成研究",
research:[],
papers:[]
};

function save(){
localStorage.setItem("site", JSON.stringify(data));
}

function setLang(l){
lang=l;
render();
}

function switchPage(p){
currentPage=p;
render();
}

function render(){

document.getElementById("name").innerText = data.name;
let main=document.getElementById("main");

if(currentPage==="home"){
main.innerHTML = `
<h1>${lang==="en"?data.title_en:data.title_cn}</h1>
`;
}

if(currentPage==="research"){

let html="<h1>Research</h1>";

data.research.forEach((r,i)=>{
html+=`
<div class="block">
${lang==="en"?r.en:r.cn}
<button onclick="deleteResearch(${i})">Delete</button>
</div>`;
});

main.innerHTML=html;

MathJax.typeset(); // 渲染公式
}

if(currentPage==="papers"){

let html="<h1>Publications</h1>";

data.papers.forEach(p=>{
html+=`
<div class="paper">
<b>${p.title}</b><br>
${p.auth}<br>
<i>${p.journal} (${p.year})</i>
</div>`;
});

main.innerHTML=html;
}

}

function toggleAdmin(){
let pwd=prompt("Password:");
if(pwd==="1234567890qw"){
document.getElementById("admin").classList.toggle("hidden");
}
}

function saveBasic(){
data.name=document.getElementById("name_input").value;
data.title_en=document.getElementById("title_en").value;
data.title_cn=document.getElementById("title_cn").value;
save(); render();
}

function addResearch(){

if(!quillEN || !quillCN){
alert("Editor not ready");
return;
}

let enHTML = quillEN.root.innerHTML;
let cnHTML = quillCN.root.innerHTML;

if(enHTML.trim()==="<p><br></p>"){
alert("Please write something");
return;
}

data.research.push({
en: enHTML,
cn: cnHTML
});

save();
render();

quillEN.setText("");
quillCN.setText("");
}

function deleteResearch(i){
data.research.splice(i,1);
save(); render();
}

function addPaper(){

let title=document.getElementById("p_title").value;

if(!title){
alert("Title required");
return;
}

data.papers.push({
title:title,
auth:document.getElementById("p_auth").value,
journal:document.getElementById("p_journal").value,
year:document.getElementById("p_year").value
});

save(); render();
}

window.onload=function(){

quillEN = new Quill('#editor_en',{ theme:'snow' });
quillCN = new Quill('#editor_cn',{ theme:'snow' });

render();
};

</script>

</body>
</html>
