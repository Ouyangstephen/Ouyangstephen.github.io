<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Final Cloud Site</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
.sidebar { width:220px; background:#f5f5f5; height:100vh; padding:20px; position:fixed; }
.main { margin-left:240px; padding:40px; }
.block { margin:20px 0; padding:15px; background:#fafafa; }
.active { font-weight:bold; color:blue; }
</style>

</head>

<body>

<div class="sidebar">
<h2>Modules</h2>
<div id="nav"></div>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="main" id="main"></div>

<div id="admin" style="display:none;" class="main">

<h3>Add Module</h3>
<input id="new_module">
<button onclick="addModule()">Add</button>

<h3>Select Module</h3>
<div id="moduleList"></div>

<h3>Editor EN</h3>
<div id="editor_en"></div>

<h3>Editor CN</h3>
<div id="editor_cn"></div>

<input type="file" id="img">
<input type="file" id="file">

<button onclick="addContent()">Add Content</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

/* 🔥 替换这里 */
const firebaseConfig = {
  apiKey: "AIzaSyDovU5fqi3Wl0fUIm8iAxYDpm1TrS1R5o4",
  authDomain: "self-website-385d9.firebaseapp.com",
  projectId: "self-website-385d9",
  storageBucket: "self-website-385d9.firebasestorage.app",
  messagingSenderId: "457658813599",
  appId: "1:457658813599:web:4dfd7b39e44db7ca3826aa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let modules=[];
let contents=[];

let currentModule=null;
let selectedModule=null;
let isAdmin=false;

let quillEN=new Quill('#editor_en',{theme:'snow'});
let quillCN=new Quill('#editor_cn',{theme:'snow'});

/* 🔥 快捷键 */
document.addEventListener("keydown", e=>{
if(e.ctrlKey && e.shiftKey && e.key==="V"){
let pwd=prompt("Password");
if(pwd==="1234567890qw"){
isAdmin=true;
admin.style.display="block";
logoutBtn.style.display="inline";
}
}
});

window.logout=function(){
isAdmin=false;
admin.style.display="none";
logoutBtn.style.display="none";
}

/* 🔥 加载所有数据 */
async function loadAll(){

modules=[];
contents=[];

let mSnap = await getDocs(collection(db,"modules"));
mSnap.forEach(d=>modules.push({id:d.id,...d.data()}));

let cSnap = await getDocs(collection(db,"contents"));
cSnap.forEach(d=>contents.push({id:d.id,...d.data()}));

render();
}

/* 🔥 渲染 */
function render(){

nav.innerHTML = modules.map((m,i)=>
`<div class="${currentModule===i?'active':''}" onclick="openModule(${i})">${m.name}</div>`
).join("");

moduleList.innerHTML = modules.map((m,i)=>
`<div onclick="selectedModule=${i}">${m.name}</div>`
).join("");

if(currentModule!==null){

let m = modules[currentModule];

let html = `<h2>${m.name}</h2>`;

contents.forEach(c=>{
if(c.module===m.id){

html+=`
<div class="block">
${c.en}
${c.img?`<img src="${c.img}" width="200">`:""}
${c.file?`<br><a href="${c.file}" target="_blank">${c.fileName}</a>`:""}
${isAdmin?`<br><button onclick="del('${c.id}')">Delete</button>`:""}
</div>`;
}
});

main.innerHTML=html;
}
}

/* 🔥 打开模块 */
window.openModule=function(i){
currentModule=i;
render();
}

/* 🔥 添加模块 */
window.addModule=async function(){
let name=new_module.value;
await addDoc(collection(db,"modules"),{name:name});
loadAll();
}

/* 🔥 添加内容 */
window.addContent=async function(){

if(selectedModule===null){
alert("select module first");
return;
}

let data={
en:quillEN.root.innerHTML,
cn:quillCN.root.innerHTML,
module:modules[selectedModule].id
};

/* 图片 */
if(img.files[0]){
let r=ref(storage,"img/"+Date.now());
await uploadBytes(r,img.files[0]);
data.img=await getDownloadURL(r);
}

/* 文件 */
if(file.files[0]){
let r=ref(storage,"file/"+Date.now());
await uploadBytes(r,file.files[0]);
data.file=await getDownloadURL(r);
data.fileName=file.files[0].name;
}

await addDoc(collection(db,"contents"),data);

loadAll();
}

/* 🔥 删除 */
window.del=async function(id){
await deleteDoc(doc(db,"contents",id));
loadAll();
}

/* 初始化 */
loadAll();

</script>

</body>
</html>
