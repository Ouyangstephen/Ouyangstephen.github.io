<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cloud Academic Site</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
.sidebar { width:220px; background:#f5f5f5; height:100vh; padding:20px; position:fixed; }
.main { margin-left:240px; padding:40px; }
.block { margin:20px 0; padding:15px; background:#fafafa; }
.delete { background:red; color:white; }
.hidden { display:none; }
</style>

</head>

<body>

<div class="sidebar">
<h2>Site</h2>
<div id="nav"></div>
<button onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
</div>

<div class="main" id="main"></div>

<div id="admin" class="hidden main">

<h3>Add Module</h3>
<input id="new_module">
<button onclick="addModule()">Add</button>

<div id="moduleList"></div>

<h3>Editor EN</h3>
<div id="editor_en"></div>

<h3>Editor CN</h3>
<div id="editor_cn"></div>

<input type="file" id="img">
<input type="file" id="file">

<button onclick="addContent()">Add Content</button>

</div>

<!-- 🔥 Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

/* 🔥 替换成你的 config */
const firebaseConfig = {
  apiKey: "AIzaSyDovU5fqi3Wl0fUIm8iAxYDpm1TrS1R5o4",
  authDomain: "self-website-385d9.firebaseapp.com",
  projectId: "self-website-385d9",
  storageBucket: "self-website-385d9.firebasestorage.app",
  messagingSenderId: "457658813599",
  appId: "1:457658813599:web:4dfd7b39e44db7ca3826aa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* 状态 */
let current=null;
let selected=null;
let isAdmin=false;
let modules=[];

/* 快捷键 */
document.addEventListener("keydown", async (e)=>{
if(e.ctrlKey && e.shiftKey && e.key==="V"){
let pwd=prompt("Password");
if(pwd==="1234567890qw"){
isAdmin=true;
admin.classList.remove("hidden");
logoutBtn.style.display="inline";
loadModules();
}
}
});

window.logout=function(){
isAdmin=false;
admin.classList.add("hidden");
logoutBtn.style.display="none";
render();
}

/* 加载模块 */
async function loadModules(){

modules=[];

let snapshot = await getDocs(collection(db,"modules"));

snapshot.forEach(docu=>{
modules.push({...docu.data(), id:docu.id});
});

render();
}

/* 添加模块 */
window.addModule=async function(){
let name=new_module.value;
await addDoc(collection(db,"modules"),{name:name});
loadModules();
}

/* 添加内容 */
window.addContent=async function(){

if(selected===null) return alert("select module");

let en=quillEN.root.innerHTML;
let cn=quillCN.root.innerHTML;

let data={en:en,cn:cn,module:modules[selected].id};

/* 图片 */
let imgFile=img.files[0];
if(imgFile){
let imgRef=ref(storage,"images/"+Date.now());
await uploadBytes(imgRef,imgFile);
data.img=await getDownloadURL(imgRef);
}

/* 文件 */
let fileFile=file.files[0];
if(fileFile){
let fileRef=ref(storage,"files/"+Date.now());
await uploadBytes(fileRef,fileFile);
data.file=await getDownloadURL(fileRef);
data.fileName=fileFile.name;
}

await addDoc(collection(db,"contents"),data);

loadModules();
}

/* 删除 */
window.del=async function(id){
await deleteDoc(doc(db,"contents",id));
loadModules();
}

/* 渲染 */
async function render(){

nav.innerHTML=modules.map((m,i)=>
`<div onclick="openModule(${i})">${m.name}</div>`
).join("");

moduleList.innerHTML=modules.map((m,i)=>
`<div onclick="selected=${i}">${m.name}</div>`
).join("");

if(current!==null){

let html=`<h2>${modules[current].name}</h2>`;

let snapshot=await getDocs(collection(db,"contents"));

snapshot.forEach(docu=>{
let c=docu.data();

if(c.module===modules[current].id){

html+=`
<div class="block">
${c.en}
${c.img?`<img src="${c.img}" width="200">`:""}
${c.file?`<br><a href="${c.file}" target="_blank">${c.fileName}</a>`:""}
${isAdmin?`<br><button onclick="del('${docu.id}')">Delete</button>`:""}
</div>`;
}
});

main.innerHTML=html;
}
}

/* 打开模块 */
window.openModule=function(i){
current=i;
render();
}

/* 初始化 */
let quillEN=new Quill('#editor_en',{theme:'snow'});
let quillCN=new Quill('#editor_cn',{theme:'snow'});

loadModules();

</script>

</body>
</html>
