<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Research Website</title>

<!-- Quill -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { margin:0; font-family: Georgia, serif; background:white; }

/* layout */
.container { display:flex; }

/* sidebar */
.sidebar {
width:250px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar div { margin:10px 0; cursor:pointer; }

/* main */
.main {
margin-left:270px;
padding:40px;
max-width:900px;
}

/* content */
.block {
margin:20px 0;
padding:15px;
background:#fafafa;
border-left:4px solid #007acc;
}

.paper {
margin:15px 0;
}

.paper-title { font-weight:bold; }
.paper-journal { font-style:italic; }

/* admin */
.hidden { display:none; }
button { margin:5px; }
</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h2 id="name"></h2>

<div onclick="showPage('home')">Home</div>
<div onclick="showPage('research')">Research</div>
<div onclick="showPage('papers')">Publications</div>

<hr>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button onclick="toggleAdmin()">Admin</button>
</div>

<div class="main" id="main"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden main">

<h2>Admin</h2>

<h3>Basic</h3>
<input id="name_input">
<input id="title_en">
<input id="title_cn">
<button onclick="saveBasic()">Save</button>

<h3>Editor EN</h3>
<div id="editor_en" style="background:white;height:150px;"></div>

<h3>Editor CN</h3>
<div id="editor_cn" style="background:white;height:150px;"></div>

<button onclick="addResearch()">Add Research Block</button>

<h3>Add Paper</h3>
<input id="p_title">
<input id="p_auth">
<input id="p_journal">
<input id="p_year">
<button onclick="addPaper()">Add Paper</button>

</div>

<script>

let lang="en";
let current="home";

let quillEN, quillCN;

let data = JSON.parse(localStorage.getItem("site")) || {
name:"Stephen Ouyang",
title_en:"Research in Total Synthesis",
title_cn:"全合成研究",
research:[],
papers:[]
};

function save(){
localStorage.setItem("site", JSON.stringify(data));
}

function setLang(l){ lang=l; render(); }

function showPage(p){
current=p;
render();
}

function render(){

document.getElementById("name").innerText = data.name;

let main=document.getElementById("main");

if(current==="home"){
main.innerHTML = `
<h1>${lang==="en"?data.title_en:data.title_cn}</h1>
`;
}

if(current==="research"){

let html="<h1>Research</h1>";

data.research.forEach((r,i)=>{
html+=`
<div class="block">
${lang==="en"?r.en:r.cn}
<button onclick="delResearch(${i})">Delete</button>
</div>`;
});

main.innerHTML=html;

MathJax.typeset(); // 渲染公式
}

if(current==="papers"){

let html="<h1>Publications</h1>";

data.papers.forEach(p=>{
html+=`
<div class="paper">
<div class="paper-title">${p.title}</div>
<div>${p.auth}</div>
<div class="paper-journal">${p.journal} (${p.year})</div>
</div>`;
});

main.innerHTML=html;
}

}

function toggleAdmin(){
let pwd=prompt("Password:");
if(pwd==="1234567890qw"){
document.getElementById("admin").classList.toggle("hidden");
}
}

function saveBasic(){
data.name=name_input.value;
data.title_en=title_en.value;
data.title_cn=title_cn.value;
save(); render();
}

function addResearch(){

let enHTML = quillEN.root.innerHTML;
let cnHTML = quillCN.root.innerHTML;

data.research.push({
en: enHTML,
cn: cnHTML
});

save(); render();
}

function delResearch(i){
data.research.splice(i,1);
save(); render();
}

function addPaper(){

data.papers.push({
title:p_title.value,
auth:p_auth.value,
journal:p_journal.value,
year:p_year.value
});

save(); render();
}

window.onload = function(){

quillEN = new Quill('#editor_en',{ theme:'snow' });
quillCN = new Quill('#editor_cn',{ theme:'snow' });

render();
};

</script>

</body>
</html>
