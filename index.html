<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FINAL COMPLETE SYSTEM</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
.sidebar { width:220px; background:#f5f5f5; height:100vh; padding:20px; position:fixed; }
.main { margin-left:240px; padding:40px; }

.block { margin:20px 0; padding:15px; background:#fafafa; }

.file-item {
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #ccc;
}

.delete { background:red; color:white; }

.active { color:blue; font-weight:bold; }
.selected { background:#d0e7ff; }
</style>
</head>

<body>

<div class="sidebar">
<h3>Modules</h3>
<div id="nav"></div>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>

<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</div>

<div class="main" id="main"></div>

<div id="admin" style="display:none;" class="main">

<h3>Modules</h3>
<input id="new_en" placeholder="EN">
<input id="new_cn" placeholder="CN">
<button onclick="addModule()">Add</button>

<div id="moduleList"></div>

<h4>Edit Module</h4>
<input id="edit_en">
<input id="edit_cn">
<button onclick="updateModule()">Update</button>

<hr>

<h3>Editor EN</h3>
<div id="editor_en"></div>

<h3>Editor CN</h3>
<div id="editor_cn"></div>

<!-- 🔥 关键：multiple -->
<input type="file" id="files" multiple>

<button onclick="addContent()">Add Content</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

/* 替换 */
const firebaseConfig = {
  apiKey: "AIzaSyDovU5fqi3Wl0fUIm8iAxYDpm1TrS1R5o4",
  authDomain: "self-website-385d9.firebaseapp.com",
  projectId: "self-website-385d9",
  storageBucket: "self-website-385d9.firebasestorage.app",
  messagingSenderId: "457658813599",
  appId: "1:457658813599:web:4dfd7b39e44db7ca3826aa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let modules=[], contents=[];
let current=null, selected=null;
let isAdmin=false;
let lang="en";

let quillEN=new Quill('#editor_en',{theme:'snow'});
let quillCN=new Quill('#editor_cn',{theme:'snow'});

/* 后台 */
document.addEventListener("keydown", e=>{
if(e.ctrlKey && e.shiftKey && e.key==="V"){
let pwd=prompt("Password");
if(pwd==="1234567890qw"){
isAdmin=true;
admin.style.display="block";
logoutBtn.style.display="inline";
render();
}
}
});

window.logout=()=>{
isAdmin=false;
admin.style.display="none";
logoutBtn.style.display="none";
render();
};

window.setLang=l=>{
lang=l;
render();
};

/* 加载 */
async function load(){
modules=[]; contents=[];

let m=await getDocs(collection(db,"modules"));
m.forEach(d=>modules.push({id:d.id,...d.data()}));

let c=await getDocs(collection(db,"contents"));
c.forEach(d=>contents.push({id:d.id,...d.data()}));

if(modules.length>0 && current===null) current=0;

render();
}

/* 渲染 */
function render(){

nav.innerHTML=modules.map((m,i)=>
`<div class="${current===i?'active':''}" onclick="openModule(${i})">
${lang==="en"?m.name_en:m.name_cn}
</div>`
).join("");

moduleList.innerHTML=modules.map((m,i)=>
`<div class="${selected===i?'selected':''}" onclick="selectModule(${i})">
${m.name_en} / ${m.name_cn}
<button class="delete" onclick="deleteModule('${m.id}')">Delete</button>
</div>`
).join("");

if(current===null){
main.innerHTML="No modules";
return;
}

let m=modules[current];

let html=`<h2>${lang==="en"?m.name_en:m.name_cn}</h2>`;

/* 内容 */
contents.forEach(c=>{
if(c.module===m.id){

html+=`
<div class="block">
${lang==="en"?c.en:c.cn}

${c.files ? c.files.map(f=>`
<div class="file-item">
<span>${f.name}</span>
<div>
<a href="${f.url}" target="_blank">Download</a>
${isAdmin?`<button onclick="deleteFile('${f.path}')">Delete</button>`:""}
</div>
</div>
`).join("") : ""}

</div>`;
}
});

main.innerHTML=html;
}

/* 模块 */
window.addModule=async()=>{
await addDoc(collection(db,"modules"),{
name_en:new_en.value,
name_cn:new_cn.value
});
load();
};

window.selectModule=i=>{
selected=i;
edit_en.value=modules[i].name_en;
edit_cn.value=modules[i].name_cn;
};

window.updateModule=async()=>{
await updateDoc(doc(db,"modules",modules[selected].id),{
name_en:edit_en.value,
name_cn:edit_cn.value
});
load();
};

window.deleteModule=async id=>{
await deleteDoc(doc(db,"modules",id));
load();
};

/* 🔥 多文件上传（核心修复） */
window.addContent=async()=>{

if(selected===null) return alert("Select module");

let uploadedFiles=[];

for(let f of files.files){

let path="files/"+Date.now()+"_"+f.name;

let r=ref(storage,path);
await uploadBytes(r,f);

let url=await getDownloadURL(r);

uploadedFiles.push({
name:f.name,
url:url,
path:path
});
}

/* 追加，不覆盖 */
await addDoc(collection(db,"contents"),{
en:quillEN.root.innerHTML,
cn:quillCN.root.innerHTML,
module:modules[selected].id,
files:uploadedFiles
});

load();
};

/* 删除文件 */
window.deleteFile=async(path)=>{
await deleteObject(ref(storage,path));
load();
};

window.openModule=i=>{
current=i;
render();
};

load();

</script>

</body>
</html>
