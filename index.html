<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>

<body>

<h1>Research Page</h1>

<button onclick="add()">Add Content</button>

<div id="content"></div>

<script>

let data = [];

function add(){

let text = prompt("Type something");

data.push(text);

render();
}

function render(){

let html="";

for(let i=0;i<data.length;i++){
html += "<p>"+data[i]+"</p>";
}

document.getElementById("content").innerHTML = html;
}

</script>

</body>
</html>
