<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Research Site</title>

<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)'], ['$', '$']] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { font-family: Arial; background:white; }
.block { margin:20px; padding:15px; background:#f0f0f0; }
button { margin:5px; }
</style>

</head>

<body>

<h1 id="title"></h1>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button onclick="toggleAdmin()">Admin</button>

<hr>

<h2>Research</h2>
<div id="research"></div>

<h2>Publications</h2>
<div id="papers"></div>

<div id="admin" style="display:none;">

<h3>Add Research</h3>
<textarea id="text_en"></textarea>
<textarea id="text_cn"></textarea>
<button onclick="addResearch()">Add</button>

<h3>Add Paper</h3>
<input id="p_title">
<input id="p_auth">
<input id="p_journal">
<input id="p_year">
<button onclick="addPaper()">Add</button>

</div>

<script>

let lang="en";

/* 🔥 安全读取数据 */
function loadData(){

let raw = localStorage.getItem("site");

if(!raw){
return {
title_en:"Research in Total Synthesis",
title_cn:"全合成研究",
research:[],
papers:[]
};
}

try{
let parsed = JSON.parse(raw);

/* 防止旧结构 */
if(!parsed.research) parsed.research=[];
if(!parsed.papers) parsed.papers=[];

return parsed;

}catch(e){

/* 如果损坏，重置 */
localStorage.clear();

return {
title_en:"Research in Total Synthesis",
title_cn:"全合成研究",
research:[],
papers:[]
};

}
}

let data = loadData();

function save(){
localStorage.setItem("site", JSON.stringify(data));
}

function setLang(l){
lang=l;
render();
}

function toggleAdmin(){
let pwd = prompt("Password:");
if(pwd==="1234567890qw"){
document.getElementById("admin").style.display="block";
}
}

function addResearch(){

let en=document.getElementById("text_en").value;
let cn=document.getElementById("text_cn").value;

if(en.trim()===""){
alert("Please write something");
return;
}

data.research.push({en:en, cn:cn});

save();
render();
}

function addPaper(){

data.papers.push({
title:p_title.value,
auth:p_auth.value,
journal:p_journal.value,
year:p_year.value
});

save();
render();
}

function render(){

document.getElementById("title").innerText =
(lang==="en"?data.title_en:data.title_cn);

/* Research */
let rHTML="";
data.research.forEach(r=>{
rHTML += "<div class='block'>" + (lang==="en"?r.en:r.cn) + "</div>";
});
document.getElementById("research").innerHTML=rHTML;

/* Papers */
let pHTML="";
data.papers.forEach(p=>{
pHTML += "<div class='block'><b>"+p.title+"</b><br>"+p.auth+"<br>"+p.journal+" ("+p.year+")</div>";
});
document.getElementById("papers").innerHTML=pHTML;

/* 公式渲染 */
MathJax.typeset();
}

render();

</script>

</body>
</html>
