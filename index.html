<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<style>
body { margin:0; font-family: Arial; background:white; color:black; }

/* Layout */
.container { display:flex; }

/* Sidebar */
.sidebar {
width:250px;
background:#f5f5f5;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2 { margin-bottom:20px; }

.sidebar div {
margin:10px 0;
cursor:pointer;
}

.sidebar div:hover { color:#007acc; }

/* Main */
.main {
margin-left:270px;
padding:40px;
width:100%;
}

/* Content blocks */
.block {
margin:20px 0;
padding:15px;
background:#fafafa;
border-left:4px solid #007acc;
}

img { max-width:100%; margin-top:10px; }

/* Admin */
.hidden { display:none; }

button { margin:5px; }
.selected { font-weight:bold; }

</style>

</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2 id="name"></h2>

<div onclick="showSection('home')">Home</div>
<div onclick="showSection(0)">Section 1</div>
<div onclick="showSection(1)">Section 2</div>
<div onclick="showSection(2)">Section 3</div>

<hr>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button onclick="toggleAdmin()">Admin</button>
</div>

<!-- Main -->
<div class="main" id="main"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden main">

<h2>Admin Panel</h2>

<input id="name_input" placeholder="Name">
<input id="main_en" placeholder="Main Title EN">
<input id="main_cn" placeholder="Main Title CN">
<input id="title_en" placeholder="Subtitle EN">
<input id="title_cn" placeholder="Subtitle CN">
<button onclick="saveBasic()">Save</button>

<h3>Add Section</h3>
<input id="sec_en">
<input id="sec_cn">
<button onclick="addSection()">Add</button>

<h3>Select Section</h3>
<div id="selector"></div>

<h3>Add Text</h3>
<textarea id="text_en"></textarea>
<textarea id="text_cn"></textarea>
<button onclick="addText()">Add</button>

<h3>Add Image</h3>
<input type="file" id="img_file">
<button onclick="addImage()">Add</button>

<h3>Upload File</h3>
<input type="file" id="file_upload">
<button onclick="uploadFile()">Upload</button>

</div>

<script>

let lang="en";
let selectedIndex=null;
let currentView="home";

let data = JSON.parse(localStorage.getItem("site")) || {
name:"Stephen Ouyang",
main_en:"Total Synthesis",
main_cn:"全合成",
title_en:"Future researcher",
title_cn:"未来科研人员",
sections:[],
files:[]
};

function save(){ localStorage.setItem("site", JSON.stringify(data)); }

function setLang(l){ lang=l; render(); }

function showSection(i){
currentView=i;
render();
}

function render(){

document.getElementById("name").innerText = data.name;

let main=document.getElementById("main");

if(currentView==="home"){

main.innerHTML = `
<h1>${lang==="en"?data.main_en:data.main_cn}</h1>
<p>${lang==="en"?data.title_en:data.title_cn}</p>
`;

return;
}

let s=data.sections[currentView];

let html=`<h1>${lang==="en"?s.title_en:s.title_cn}</h1>`;

if(s.blocks){
s.blocks.forEach((b,bi)=>{

if(b.type==="text"){
html+=`<div class="block">
<p>${lang==="en"?b.en:b.cn}</p>
<button onclick="delBlock(${currentView},${bi})">Delete</button>
</div>`;
}

if(b.type==="image"){
html+=`<div class="block">
<img src="${b.src}">
<button onclick="delBlock(${currentView},${bi})">Delete</button>
</div>`;
}

});
}

main.innerHTML=html;

renderSelector();
}

function toggleAdmin(){
let pwd=prompt("Password:");
if(pwd==="1234567890qw"){
document.getElementById("admin").classList.toggle("hidden");

name_input.value=data.name;
main_en.value=data.main_en;
main_cn.value=data.main_cn;
title_en.value=data.title_en;
title_cn.value=data.title_cn;
}
}

function saveBasic(){
data.name=name_input.value;
data.main_en=main_en.value;
data.main_cn=main_cn.value;
data.title_en=title_en.value;
data.title_cn=title_cn.value;
save(); render();
}

function addSection(){

let en=sec_en.value;
let cn=sec_cn.value;

data.sections.push({
title_en:en,
title_cn:cn,
blocks:[]
});

selectedIndex=data.sections.length-1;

save(); render();
}

function renderSelector(){

selector.innerHTML="";

data.sections.forEach((s,i)=>{
selector.innerHTML+=`
<div onclick="selectSection(${i})">${s.title_en}</div>`;
});
}

function selectSection(i){ selectedIndex=i; }

function addText(){

data.sections[selectedIndex].blocks.push({
type:"text",
en:text_en.value,
cn:text_cn.value
});

save(); render();
}

function addImage(){

let file=img_file.files[0];

let reader=new FileReader();
reader.onload=function(){

data.sections[selectedIndex].blocks.push({
type:"image",
src:reader.result
});

save(); render();
};

reader.readAsDataURL(file);
}

function delBlock(i,bi){
data.sections[i].blocks.splice(bi,1);
save(); render();
}

function uploadFile(){

let file=file_upload.files[0];

let reader=new FileReader();
reader.onload=function(){

data.files.push({
name:file.name,
data:reader.result
});

save(); render();
};

reader.readAsDataURL(file);
}

render();

</script>

</body>
</html>
