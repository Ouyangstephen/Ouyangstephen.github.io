<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Research Website</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<style>
body { margin:0; font-family:Arial; display:flex; }

/* 左侧 */
.sidebar {
width:260px;
background:#f8f8f8;
padding:20px;
height:100vh;
overflow:auto;
}

.module {
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.module:hover { background:#eee; }

/* 主区域 */
.main {
flex:1;
padding:20px;
}

/* 上传 */
.upload {
border:2px dashed #ccc;
padding:20px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
}

/* 文件 */
.file {
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #eee;
}

iframe {
width:100%;
height:80vh;
border:none;
}
</style>
</head>

<body>

<div class="sidebar">

<h3>Modules</h3>
<div id="modules"></div>

<hr>

<input id="newModule" placeholder="New Module">
<button onclick="addModule()">Add</button>

<hr>

<div class="upload" onclick="fileInput.click()">
Upload PDF
<input type="file" id="fileInput" multiple hidden>
</div>

<div id="fileList">Loading...</div>

</div>

<div class="main">

<h2 id="title"></h2>

<div id="editor_en"></div>
<div id="editor_cn"></div>

<hr>

<iframe id="viewer"></iframe>

</div>

<script>

/* 🔥 修改这里 */
const GITHUB_TOKEN = "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";
const REPO = "Ouyangstephen/Ouyangstephen.github.io";
const BRANCH = "main";

/* 模块 */
let modules = JSON.parse(localStorage.getItem("modules")) || [];
let current = null;

function saveModules(){
localStorage.setItem("modules", JSON.stringify(modules));
}

function addModule(){
let name = newModule.value;
if(!name) return;

modules.push(name);
saveModules();
renderModules();
}

function renderModules(){
modulesDiv.innerHTML = modules.map((m,i)=>
`<div class="module" onclick="selectModule(${i})">${m}</div>`
).join("");
}

function selectModule(i){
current = modules[i];
title.innerText = current;
}

/* 编辑器 */
let quillEN = new Quill('#editor_en',{theme:'snow'});
let quillCN = new Quill('#editor_cn',{theme:'snow'});

/* 上传 */
fileInput.addEventListener("change", e=>{
uploadFiles(e.target.files);
});

async function uploadFiles(files){

for(let file of files){

let base64 = await toBase64(file);

let path = "pdfs/" + Date.now() + "_" + file.name;

await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{
method:"PUT",
headers:{
Authorization:"token " + GITHUB_TOKEN,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"upload pdf",
content:base64.split(",")[1],
branch:BRANCH
})
});

}

loadFiles();
}

/* base64 */
function toBase64(file){
return new Promise(res=>{
let reader=new FileReader();
reader.onload=()=>res(reader.result);
reader.readAsDataURL(file);
});
}

/* 加载文件 */
async function loadFiles(){

try{

let res = await fetch(`https://api.github.com/repos/${REPO}/contents/pdfs`);

if(res.status !== 200){
fileList.innerHTML = "❌ No pdfs folder or no files";
return;
}

let data = await res.json();

if(data.length === 0){
fileList.innerHTML = "No files yet";
return;
}

let html="";

data.forEach(f=>{
html += `
<div class="file">
<span onclick="openPDF('${f.download_url}')">📄 ${f.name}</span>
<button onclick="deleteFile('${f.path}','${f.sha}')">X</button>
</div>
`;
});

fileList.innerHTML = html;

}catch(e){
fileList.innerHTML = "❌ Error loading files";
}

}

/* 打开 */
function openPDF(url){
viewer.src = url;
}

/* 删除 */
async function deleteFile(path,sha){

await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{
method:"DELETE",
headers:{
Authorization:"token " + GITHUB_TOKEN,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"delete",
sha:sha,
branch:BRANCH
})
});

loadFiles();
}

/* 初始化 */
renderModules();
loadFiles();

</script>

</body>
</html>
