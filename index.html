<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<style>
body { font-family: Georgia, serif; margin:0; background:#ffffff; }

/* 顶部 */
.header {
text-align:center;
padding:20px;
border-bottom:1px solid #ccc;
}

/* Main Street */
.street {
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.box {
width:250px;
height:150px;
padding:15px;
color:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
font-weight:bold;
}

.box:hover { transform:scale(1.05); }

/* 页面内容 */
.page {
max-width:800px;
margin:auto;
padding:30px;
}

h1 { text-align:center; }

ul { text-align:left; }

.hidden { display:none; }

</style>

</head>

<body>

<div class="header">
<h1 id="mainTitle"></h1>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('cn')">中文</button>
<button onclick="toggleAdmin()">Admin</button>
</div>

<!-- MAIN STREET -->
<div id="home" class="street"></div>

<!-- PAGE -->
<div id="page" class="page hidden"></div>

<!-- ADMIN -->
<div id="admin" class="hidden page">

<h2>Admin</h2>

<h3>Main Title</h3>
<input id="main_en">
<input id="main_cn">
<button onclick="saveMain()">Save</button>

<h3>Add Module</h3>
<input id="mod_en" placeholder="EN Title">
<input id="mod_cn" placeholder="CN Title">
<input id="mod_color" placeholder="color (e.g. lightblue)">
<button onclick="addModule()">Add</button>

<h3>Select Module</h3>
<div id="selector"></div>

<h3>Add Content</h3>
<textarea id="text_en"></textarea>
<textarea id="text_cn"></textarea>
<input type="file" id="img">
<button onclick="addContent()">Add</button>

</div>

<script>

let lang="en";
let selected=null;
let current=null;

let data = JSON.parse(localStorage.getItem("site")) || {
main_en:"Main Street",
main_cn:"主页",
modules:[]
};

function save(){ localStorage.setItem("site", JSON.stringify(data)); }

function setLang(l){ lang=l; render(); }

function render(){

document.getElementById("mainTitle").innerText =
(lang==="en")?data.main_en:data.main_cn;

let home=document.getElementById("home");
home.innerHTML="";

data.modules.forEach((m,i)=>{
home.innerHTML+=`
<div class="box" style="background:${m.color}"
onclick="openPage(${i})">
${lang==="en"?m.title_en:m.title_cn}
</div>`;
});

renderSelector();
}

function openPage(i){

current=i;

let m=data.modules[i];

document.getElementById("home").classList.add("hidden");
let page=document.getElementById("page");
page.classList.remove("hidden");

let html=`<h1>${lang==="en"?m.title_en:m.title_cn}</h1>
<button onclick="back()">Back</button>`;

if(m.contents){
m.contents.forEach(c=>{
html+=`
<p>${lang==="en"?c.en:c.cn}</p>
${c.img?`<img src="${c.img}">`:""}
`;
});
}

page.innerHTML=html;
}

function back(){
document.getElementById("home").classList.remove("hidden");
document.getElementById("page").classList.add("hidden");
}

function toggleAdmin(){
let pwd=prompt("Password:");
if(pwd==="1234567890qw"){
document.getElementById("admin").classList.toggle("hidden");
}
}

function saveMain(){
data.main_en=main_en.value;
data.main_cn=main_cn.value;
save(); render();
}

function addModule(){

data.modules.push({
title_en:mod_en.value,
title_cn:mod_cn.value,
color:mod_color.value,
contents:[]
});

save(); render();
}

function renderSelector(){

selector.innerHTML="";

data.modules.forEach((m,i)=>{
selector.innerHTML+=`
<div onclick="selected=${i}">
${m.title_en}
</div>`;
});
}

function addContent(){

let file=img.files[0];

if(file){
let reader=new FileReader();
reader.onload=function(){
data.modules[selected].contents.push({
en:text_en.value,
cn:text_cn.value,
img:reader.result
});
save(); render();
};
reader.readAsDataURL(file);
}else{
data.modules[selected].contents.push({
en:text_en.value,
cn:text_cn.value
});
save(); render();
}
}

render();

</script>

</body>
</html>
