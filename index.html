<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<style>
body { font-family: Arial; background:#020617; color:white; margin:0; }
nav { display:flex; justify-content:space-between; padding:15px; background:black; }
.section { padding:40px; text-align:center; }
.card { background:#1e293b; margin:15px auto; padding:20px; width:60%; border-radius:10px; cursor:pointer; }
img { max-width:100%; margin-top:10px; border-radius:8px; }
button { margin:5px; padding:5px 10px; }
.hidden { display:none; }
</style>

</head>

<body>

<nav>
  <h2 id="name"></h2>
  <div>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('cn')">中文</button>
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</nav>

<div id="home">

<div class="section">
  <h1>Total Synthesis</h1>
  <p id="title"></p>
</div>

<div class="section">
  <h2>About</h2>
  <p id="about"></p>
</div>

<div class="section">
  <h2>Modules</h2>
  <div id="modules"></div>
</div>

</div>

<!-- DETAIL PAGE -->
<div id="detail" class="hidden section"></div>

<!-- ADMIN -->
<div id="admin" class="hidden section">

<h2>Admin Panel</h2>

<input id="name_input">
<input id="title_en">
<input id="title_cn">
<textarea id="about_en"></textarea>
<textarea id="about_cn"></textarea>
<button onclick="saveBasic()">Save</button>

<h3>Add Module</h3>
<input id="m_title_en">
<input id="m_title_cn">
<button onclick="addModule()">Add Module</button>

<h3>Add Text to Module</h3>
<input id="text_index" placeholder="Module index">
<textarea id="text_en"></textarea>
<textarea id="text_cn"></textarea>
<button onclick="addText()">Add Text</button>

<h3>Upload Image to Module</h3>
<input id="img_index" placeholder="Module index">
<input type="file" id="img_file">
<button onclick="addImage()">Upload</button>

</div>

<script>

let lang="en";

let data = JSON.parse(localStorage.getItem("site")) || {
    name:"Stephen Ouyang",
    title_en:"Future researcher in pharmaceutical total synthesis",
    title_cn:"未来从事药物全合成研究的科研人员",
    about_en:"I focus on total synthesis.",
    about_cn:"我专注于全合成。",
    modules:[]
};

function save(){
    localStorage.setItem("site", JSON.stringify(data));
}

function setLang(l){
    lang=l;
    render();
}

function getParam(){
    let url = new URL(window.location.href);
    return url.searchParams.get("module");
}

function render(){

    let idx = getParam();

    name.innerText = data.name;

    if(idx !== null){
        showDetail(idx);
        return;
    }

    home.style.display="block";
    detail.classList.add("hidden");

    title.innerText = (lang==="en")?data.title_en:data.title_cn;
    about.innerText = (lang==="en")?data.about_en:data.about_cn;

    modules.innerHTML="";

    data.modules.forEach((m,i)=>{
        modules.innerHTML += `
        <div class="card" onclick="openModule(${i})">
            <h3>${lang==="en"?m.title_en:m.title_cn}</h3>
        </div>`;
    });
}

function openModule(i){
    window.location.search = "?module=" + i;
}

function showDetail(i){

    home.style.display="none";
    detail.classList.remove("hidden");

    let m = data.modules[i];

    let html = `
    <h2>${lang==="en"?m.title_en:m.title_cn}</h2>
    <button onclick="back()">Back</button>
    `;

    if(m.texts){
        m.texts.forEach((t,ti)=>{
            html += `
            <div class="card">
                <p>${lang==="en"?t.en:t.cn}</p>
                <button onclick="delText(${i},${ti})">Delete</button>
            </div>`;
        });
    }

    if(m.images){
        m.images.forEach((img,ii)=>{
            html += `
            <div class="card">
                <img src="${img}">
                <button onclick="delImg(${i},${ii})">Delete</button>
            </div>`;
        });
    }

    detail.innerHTML = html;
}

function back(){
    window.location.href = window.location.pathname;
}

function toggleAdmin(){
    let pwd = prompt("Password:");
    if(pwd==="1234"){
        admin.classList.toggle("hidden");

        name_input.value = data.name;
        title_en.value = data.title_en;
        title_cn.value = data.title_cn;
        about_en.value = data.about_en;
        about_cn.value = data.about_cn;
    }
}

function saveBasic(){
    data.name = name_input.value;
    data.title_en = title_en.value;
    data.title_cn = title_cn.value;
    data.about_en = about_en.value;
    data.about_cn = about_cn.value;
    save(); render();
}

function addModule(){
    data.modules.push({
        title_en:m_title_en.value,
        title_cn:m_title_cn.value,
        texts:[],
        images:[]
    });
    save(); render();
}

function addText(){
    let i = text_index.value;
    data.modules[i].texts.push({
        en:text_en.value,
        cn:text_cn.value
    });
    save(); render();
}

function delText(i,ti){
    data.modules[i].texts.splice(ti,1);
    save(); render();
}

function addImage(){
    let i = img_index.value;
    let file = img_file.files[0];

    let reader = new FileReader();
    reader.onload = function(){
        data.modules[i].images.push(reader.result);
        save(); render();
    };
    reader.readAsDataURL(file);
}

function delImg(i,ii){
    data.modules[i].images.splice(ii,1);
    save(); render();
}

render();

</script>

</body>
</html>
