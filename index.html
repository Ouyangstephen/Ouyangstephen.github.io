<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Website</title>

<style>
body { font-family: Arial; background:#020617; color:white; margin:0; }
nav { display:flex; justify-content:space-between; padding:15px; background:black; }
.section { padding:40px; text-align:center; }
.card { background:#1e293b; margin:10px auto; padding:15px; width:60%; border-radius:10px; }
button { margin:5px; padding:5px 10px; }
.hidden { display:none; }
</style>

</head>

<body>

<nav>
  <h2 id="name"></h2>
  <div>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('cn')">中文</button>
    <button onclick="toggleAdmin()">Admin</button>
  </div>
</nav>

<div class="section">
  <h1>Total Synthesis</h1>
  <p id="title"></p>
</div>

<div class="section">
  <h2>About</h2>
  <p id="about"></p>
</div>

<div class="section">
  <h2>Sections</h2>
  <div id="sections"></div>
</div>

<div class="section">
  <h2>Publications</h2>
  <div id="pubs"></div>
</div>

<div class="section">
  <h2>Files</h2>
  <div id="files"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden section">

<h2>Admin Panel</h2>

<input id="name_input" placeholder="Name">
<input id="title_en">
<input id="title_cn">
<textarea id="about_en"></textarea>
<textarea id="about_cn"></textarea>
<button onclick="saveBasic()">Save</button>

<h3>Add Section</h3>
<input id="s_en" placeholder="Title EN">
<input id="s_cn" placeholder="Title CN">
<textarea id="c_en"></textarea>
<textarea id="c_cn"></textarea>
<button onclick="addSection()">Add</button>

<h3>Add Publication</h3>
<input id="p_title">
<input id="p_auth">
<input id="p_journal">
<input id="p_year">
<button onclick="addPub()">Add</button>

<h3>Upload File</h3>
<input type="file" id="file">
<button onclick="upload()">Upload</button>

</div>

<script>

let lang = "en";

let data = JSON.parse(localStorage.getItem("site")) || {
    name:"Stephen Ouyang",
    title_en:"Future researcher in pharmaceutical total synthesis",
    title_cn:"未来从事药物全合成研究的科研人员",
    about_en:"I focus on total synthesis.",
    about_cn:"我专注于全合成。",
    sections:[],
    pubs:[],
    files:[]
};

function save(){
    localStorage.setItem("site", JSON.stringify(data));
}

function setLang(l){
    lang = l;
    render();   // ✅ 关键修复
}

function render(){

    name.innerText = data.name;

    title.innerText = (lang==="en")?data.title_en:data.title_cn;
    about.innerText = (lang==="en")?data.about_en:data.about_cn;

    // sections
    sections.innerHTML="";
    data.sections.forEach((s,i)=>{
        sections.innerHTML += `
        <div class="card">
        <h3>${lang==="en"?s.en:s.cn}</h3>
        <p>${lang==="en"?s.c_en:s.c_cn}</p>
        <button onclick="delSection(${i})">Delete</button>
        </div>`;
    });

    // publications
    pubs.innerHTML="";
    data.pubs.forEach((p,i)=>{
        pubs.innerHTML += `
        <div class="card">
        <b>${p.title}</b><br>
        ${p.auth} (${p.year})<br>
        ${p.journal}<br>
        <button onclick="delPub(${i})">Delete</button>
        </div>`;
    });

    // files
    files.innerHTML="";
    data.files.forEach((f,i)=>{
        files.innerHTML += `
        <div>
        <a href="${f.url}" target="_blank">${f.name}</a>
        <button onclick="delFile(${i})">Delete</button>
        </div>`;
    });

}

function toggleAdmin(){
    let pwd = prompt("Password:");
    if(pwd==="1234"){
        admin.classList.toggle("hidden");

        name_input.value = data.name;
        title_en.value = data.title_en;
        title_cn.value = data.title_cn;
        about_en.value = data.about_en;
        about_cn.value = data.about_cn;
    }
}

function saveBasic(){
    data.name = name_input.value;
    data.title_en = title_en.value;
    data.title_cn = title_cn.value;
    data.about_en = about_en.value;
    data.about_cn = about_cn.value;
    save(); render();
}

function addSection(){
    data.sections.push({
        en:s_en.value,
        cn:s_cn.value,
        c_en:c_en.value,
        c_cn:c_cn.value
    });
    save(); render();
}

function delSection(i){
    data.sections.splice(i,1);
    save(); render();
}

function addPub(){
    data.pubs.push({
        title:p_title.value,
        auth:p_auth.value,
        journal:p_journal.value,
        year:p_year.value
    });
    save(); render();
}

function delPub(i){
    data.pubs.splice(i,1);
    save(); render();
}

function upload(){
    let f = file.files[0];

    if(!f){
        alert("Please select a file");
        return;
    }

    let reader = new FileReader();
    reader.onload = function(){
        data.files.push({
            name:f.name,
            url:reader.result
        });
        save();
        render();
    };
    reader.readAsDataURL(f);
}

function delFile(i){
    data.files.splice(i,1);
    save(); render();
}

render();

</script>

</body>
</html>
